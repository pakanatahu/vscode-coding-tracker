<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slashcoded Local Activity Summary</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="report-shell">
        <header class="hero">
            <p class="eyebrow">Local fallback report</p>
            <h1>Local Activity Summary</h1>
            <p class="lede">Minimal stats generated directly from the locally stored VS Code tracking data on this machine.</p>
        </header>

        <section id="totals" class="card"></section>
        <section id="activity-groups" class="card"><h2>By activity</h2></section>
        <section id="repo-groups" class="card"><h2>By repository</h2></section>
        <section id="branch-groups" class="card"><h2>By branch</h2></section>
        <section id="extension-groups" class="card"><h2>By file extension</h2></section>

        <aside class="desktop-cta card">
            <p>Want more advanced analytics? Download Slashcoded Desktop.</p>
            <a class="cta-link" href="https://lundholm.io/project/slashcoded" target="_blank" rel="noreferrer">Get Slashcoded Desktop</a>
        </aside>
    </main>

    <script src="/app.js"></script>
</body>
</html>
