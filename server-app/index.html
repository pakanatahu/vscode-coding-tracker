<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SlashCoded Local Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="dashboard-shell">
        <header class="dashboard-header">
            <div class="brand-row">
                <a class="brand-mark" href="https://lundholm.io/projects/slashcoded?ref=vscodeext" target="_blank" rel="noreferrer" aria-label="Open SlashCoded project page">
                    <img src="/assets/slashcoded.png" alt="" aria-hidden="true">
                    <span>SLASHCODED | VS Code Built-In Dashboard</span>
                </a>
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">Dark mode</button>
                    <a class="desktop-link" href="https://lundholm.io/projects/slashcoded?ref=vscodeext" target="_blank" rel="noreferrer">Get SlashCoded Desktop</a>
                </div>
            </div>
        </header>

        <section id="quick-stats" class="panel quick-stats"></section>
        <section id="chart24h" class="panel chart24h-card">
            <div class="chart-header">
                <h2>Last 24 hours</h2>
            </div>
            <div class="chart-canvas-wrap"></div>
        </section>

        <section id="chartMonth" class="panel chart-month-card">
            <div class="chart-header">
                <h2>This month</h2>
            </div>
            <div class="chart-canvas-wrap"></div>
        </section>

        <section id="secondary-breakdowns" class="secondary-grid">
            <section id="activity-groups" class="panel"><h2>By activity</h2></section>
            <section id="repo-groups" class="panel"><h2>By repository</h2></section>
            <section id="branch-groups" class="panel"><h2>By repository branch</h2></section>
            <section id="extension-groups" class="panel"><h2>By language</h2></section>
        </section>

        <aside id="desktop-cta" class="panel upgrade-panel">
            <div class="upgrade-copy">
                <p class="eyebrow">Upgrade</p>
                <h2>Want more advanced analytics?</h2>
                <p>Open richer history and deeper breakdowns in SlashCoded Desktop.</p>
            </div>
            <a class="cta-link" href="https://lundholm.io/projects/slashcoded?ref=vscodeext" target="_blank" rel="noreferrer">Get SlashCoded Desktop</a>
        </aside>
    </main>

    <script src="/vendor/chart.js/chart.umd.js"></script>
    <script src="/app.js"></script>
</body>
</html>
