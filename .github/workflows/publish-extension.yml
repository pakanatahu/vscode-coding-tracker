name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${TAG}" != "v${PKG_VERSION}" ]]; then
            echo "Tag ${TAG} does not match package.json version v${PKG_VERSION}"
            exit 1
          fi

      - name: Build and package VSIX
        run: npm run package

      - name: Resolve VSIX path
        id: vsix
        shell: bash
        run: |
          VSIX_PATH="$(ls -t ./*.vsix | head -n 1)"
          echo "path=${VSIX_PATH}" >> "${GITHUB_OUTPUT}"
          echo "VSIX_PATH=${VSIX_PATH}" >> "${GITHUB_ENV}"

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.path }}" -p "${VSCE_PAT}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ steps.vsix.outputs.path }}
          if-no-files-found: error

      - name: Create/Update GitHub Release with VSIX
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
